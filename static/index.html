<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BirdNET Local Analyzer</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>BirdNET Local Analyzer</h1>
        </div>
      </header>

      <main class="app">
        <section class="card card-upload">
          <div class="upload-head">
            <div class="upload-label">Audio Input</div>
            <div id="supportedFormats" class="hint"></div>
          </div>

          <div id="dropZone" class="dropzone">
            <div class="dropzone-icon">⤴</div>
            <div class="dropzone-title">Drag audio here or choose a file</div>

            <div class="upload-actions">
              <button id="fileBtn" type="button" class="secondary">
                Choose File
              </button>

              <input
                id="audioFile"
                type="file"
                accept=".mp3,.wav,.m4a,.ogg,.flac,.aac"
                hidden
              />
            </div>

            <div id="fileName" class="file-name">No file selected</div>
          </div>
        </section>

        <div class="grid">
          <section class="card">
            <div class="card-head">
              <h2>Analysis Settings</h2>
            </div>

            <div class="field-grid">
              <div class="field">
                <label for="language">Species Labels</label>
                <select id="language"></select>
              </div>

              <div class="field">
                <label for="timeMode">Time Filter</label>
                <select id="timeMode">
                  <option value="none" selected>None</option>
                  <option value="date">Recording Date</option>
                  <option value="week">Calendar Week</option>
                </select>
              </div>

              <div class="field hidden" id="dateField">
                <label for="recordingDate">Recording Date</label>
                <input id="recordingDate" type="date" />
              </div>

              <div class="field hidden" id="weekField">
                <label for="week">Calendar Week</label>
                <input id="week" type="number" min="1" max="53" />
              </div>

              <div class="field">
                <label for="geoMode">Location Filter</label>
                <select id="geoMode">
                  <option value="none" selected>None</option>
                  <option value="auto">Use Current Location</option>
                  <option value="manual">Enter Coordinates</option>
                </select>
              </div>
            </div>

            <div id="geoFields" class="row hidden mt-12">
              <div class="field">
                <label for="lat">Latitude</label>
                <input id="lat" type="number" step="any" />
              </div>

              <div class="field">
                <label for="lon">Longitude</label>
                <input id="lon" type="number" step="any" />
              </div>
            </div>

            <div class="action-row">
              <button id="analyzeBtn" type="button" class="primary large-btn">
                Start Analysis
              </button>
            </div>

            <div class="progress-card">
              <div class="progress-head">
                <span id="progressStage">Idle</span>
                <span id="progressValue">0%</span>
              </div>

              <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
              </div>
            </div>

            <div id="status" class="status"></div>
          </section>

          <section class="card">
            <div class="card-head">
              <h2>Audio View</h2>
              <div id="audioMeta" class="results-meta"></div>
            </div>

            <div class="audio-wrap">
              <div class="audio-player">
                <button id="playToggle" class="play-btn" type="button">
                  ▶
                </button>

                <div class="progress-wrap">
                  <input
                    id="seekBar"
                    type="range"
                    min="0"
                    max="100"
                    value="0"
                  />
                </div>

                <span id="currentTime">00:00</span>
              </div>

              <audio id="audioPlayer"></audio>

              <div class="spectrogram-wrap">
                <div id="visualizerLoading" class="visualizer-loading hidden">
                  <div class="spinner"></div>
                  <div class="visualizer-loading-text">
                    Rendering audio view...
                  </div>
                </div>

                <canvas id="spectrogramCanvas" height="260"></canvas>
                <canvas id="timelineCanvas" height="72"></canvas>
              </div>

              <ul class="legend">
                <li>Spectrogram = frequency energy</li>
                <li>Blue line = playhead</li>
                <li>Bottom timeline = detections</li>
              </ul>
            </div>
          </section>
        </div>

        <section class="card mt-20">
          <div class="results-head">
            <h2>Results</h2>
            <div id="resultsMeta" class="results-meta"></div>
          </div>

          <div id="results" class="results">
            <div class="empty">No results.</div>
          </div>
        </section>

        <section class="card mt-20">
          <div class="results-head">
            <h2>Debug JSON</h2>
            <div class="results-toolbar">
              <button
                id="exportJsonBtn"
                type="button"
                class="secondary small-btn"
              >
                Export JSON
              </button>

              <button
                id="exportCsvBtn"
                type="button"
                class="secondary small-btn"
              >
                Export CSV
              </button>
            </div>
          </div>

          <pre id="rawJson" class="debug"></pre>
        </section>
      </main>
    </div>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
